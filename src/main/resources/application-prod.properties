# Configure data source for MariaDB
spring.datasource.url=jdbc:mariadb://localhost:3306/guestbook?useSSL=false&serverTimezone=UTC
spring.datasource.username=guestbook
spring.datasource.password=GuestB00k!2026
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Disable developer tools
spring.h2.console.enabled=false

# Disable detailed error messages
server.error.include-stacktrace=never
server.error.include-message=never

# Optimize connection pool using HikariCP
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Control SQL initialization (disabled)
spring.jpa.hibernate.ddl-auto=update

# Appropriate logging levels
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.edu.vwcc.jdbc=INFO

# Set a server port if needed (uncomment and adjust)
server.port=5000
