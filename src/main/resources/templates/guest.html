<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${guest.nickname} + '''s Entry'">Guest Entry</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap">
</head>
<body>
    <div class="scroll-container">
        <div class="scroll">
            <div class="scroll-top"></div>
            <div class="scroll-content">
                <h1 class="calligraphy-header" th:text="|${guest.nickname}'s Entry|">Guest's Entry</h1>

                <div class="guest-details">
                    <div class="guest-portrait-container">
                        <svg class="guest-portrait" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <!-- Decorative frame -->
                            <path d="M10,10 L90,10 L90,90 L10,90 Z" fill="none" stroke="#8b4513" stroke-width="6" />
                            <path d="M5,5 L95,5 L95,95 L5,95 Z" fill="none" stroke="#d9c7a6" stroke-width="2" />

                            <!-- User silhouette -->
                            <circle cx="50" cy="35" r="15" fill="#614e3c" />
                            <path d="M30,70 C30,55 70,55 70,70" fill="#614e3c" />
                            <path d="M25,75 C25,60 75,60 75,75" fill="none" stroke="#614e3c" stroke-width="10" stroke-linecap="round" />

                            <!-- Small decorative elements -->
                            <circle cx="15" cy="15" r="3" fill="#8b4513" />
                            <circle cx="85" cy="15" r="3" fill="#8b4513" />
                            <circle cx="15" cy="85" r="3" fill="#8b4513" />
                            <circle cx="85" cy="85" r="3" fill="#8b4513" />
                        </svg>
                    </div>
                    <div class="guest-info">
                        <p class="guest-timestamp">
                            On <span th:text="${#temporals.format(guest.createdAt, 'MMMM d, yyyy')}">March 30, 2026</span>
                            at <span th:text="${#temporals.format(guest.createdAt, 'h:mma')}">4:04PM</span>
                        </p>
                        <p class="guest-nickname"><strong th:text="${guest.nickname}">Nickname</strong> wrote:</p>
                        <blockquote class="guest-comment" th:text="${guest.comment}">Their comment here</blockquote>
                    </div>
                </div>

                <div class="api-info">
                    <h2>REST API Usage</h2>
                    <p>To delete this entry, make a DELETE request with your token:</p>
                    <pre>DELETE /api/guests/{your-delete-token}</pre>
                </div>

                <div class="back-link">
                    <a th:href="@{/}">Back to Guestbook</a>
                </div>
            </div>
            <div class="scroll-bottom"></div>
        </div>
    </div>
</body>
</html>
