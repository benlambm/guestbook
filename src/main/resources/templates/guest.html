<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${guest.nickname}'s Entry|">Guest Entry</title>
    <link rel="stylesheet" th:href="@{/styles.css}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tangerine:wght@700&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&display=swap">
</head>
<body>
    <div class="scroll-container">
        <div class="scroll">
            <div class="scroll-top"></div>
            <div class="scroll-content">

                <div class="profile-card">
                    <!-- Avatar -->
                    <div class="profile-avatar">
                        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="50" cy="50" r="48" fill="none" stroke="#8b4513" stroke-width="3"/>
                            <circle cx="50" cy="50" r="44" fill="none" stroke="#d9c7a6" stroke-width="1"/>
                            <circle cx="50" cy="38" r="14" fill="#614e3c"/>
                            <path d="M28,72 C28,56 72,56 72,72" fill="#614e3c"/>
                            <path d="M24,76 C24,58 76,58 76,76" fill="none" stroke="#614e3c" stroke-width="8" stroke-linecap="round"/>
                        </svg>
                    </div>

                    <!-- Nickname -->
                    <h1 class="profile-nickname" th:text="${guest.nickname}">Nickname</h1>

                    <!-- Comment -->
                    <blockquote class="profile-comment">
                        <span th:text="${guest.comment}">Their comment here</span>
                    </blockquote>

                    <!-- Timestamp -->
                    <p class="profile-meta">
                        Signed on
                        <span th:text="${#temporals.format(guest.createdAt, 'MMMM d, yyyy')}">March 30, 2026</span>
                        at
                        <span th:text="${#temporals.format(guest.createdAt, 'h:mm a')}">4:04 PM</span>
                    </p>

                    <!-- View counter -->
                    <p class="profile-views">
                        <span class="views-icon">&#x1F441;</span>
                        Your signature has been viewed
                        <strong th:text="${guest.viewCount}">0</strong>
                        <span th:text="${guest.viewCount == 1 ? 'time' : 'times'}">times</span>
                        since
                        <span th:text="${#temporals.format(guest.createdAt, 'MMM d, yyyy')}">Mar 30, 2026</span>
                    </p>

                    <div class="profile-divider"></div>

                    <!-- API hint -->
                    <p class="profile-api-hint">
                        To remove your entry: <code>DELETE /api/guests/{your-token}</code>
                    </p>
                </div>

                <div class="back-link">
                    <a th:href="@{/}">&#x2190; Back to Guestbook</a>
                </div>

            </div>
            <div class="scroll-bottom"></div>
        </div>
    </div>
</body>
</html>
